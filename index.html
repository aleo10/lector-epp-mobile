<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EPP - Prueba de rendimiento</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  #video { display: none; }
  #canvas { width: 100%; height: 100%; object-fit: cover; }
  #hud {
    position: absolute; top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: flex-start;
    color: #fff; font-size: 14px; pointer-events: none;
  }
  #fps {
    background: rgba(0,0,0,.6); padding: 8px 12px; border-radius: 8px;
    font-size: 22px; font-weight: 700;
  }
  #fps b { color: #4ade80; }
  #info { background: rgba(0,0,0,.6); padding: 8px 12px; border-radius: 8px; text-align: right; line-height: 1.5; }
  #start {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    padding: 18px 36px; font-size: 20px; border: none; border-radius: 12px;
    background: #2563eb; color: #fff; font-weight: 700;
  }
  #status { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #fff; background: rgba(0,0,0,.6); padding: 8px 16px; border-radius: 8px; font-size: 14px;
    max-width: 90%; text-align: center; }
  #modebar { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; }
  #modebar button { padding: 8px 18px; border: 2px solid #2563eb; border-radius: 20px;
    background: rgba(0,0,0,.6); color: #fff; font-size: 14px; font-weight: 600; }
  #modebar button.active { background: #2563eb; }
</style>
</head>
<body>
<div id="wrap">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="fps"><b>--</b> FPS</div>
    <div id="info">backend: <span id="backend">--</span><br>inf: <span id="inftime">--</span> ms<br>det: <span id="ndet">0</span></div>
  </div>
  <button id="start">Iniciar cámara</button>
  <div id="modebar">
    <button id="mode-local" class="active">📱 Celular</button>
    <button id="mode-runpod">☁️ RunPod</button>
  </div>
  <div id="status">Listo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.js"></script>
<script>
const MODEL_URL = "models/yolox_ppe.onnx";
const INPUT = 640;
const CONF = 0.35, NMS = 0.45;
const CLASSES = ["construction","Hardhat","Mask","NO-Hardhat","NO-Mask","NO-Safety Vest","Person","Safety Cone","Safety Vest","machinery","vehicle"];
// Solo clases relevantes para EPP; se ignoran construction, Safety Cone, machinery y vehicle
// (esas confunden autos/objetos y no aportan al analisis de EPP).
const SHOW = new Set(["Person","Hardhat","NO-Hardhat","Mask","NO-Mask","Safety Vest","NO-Safety Vest"]);
function colorFor(n){ if(["Hardhat","Mask","Safety Vest"].includes(n)) return "#16c60c";
  if(n.startsWith("NO-")) return "#ff2d2d"; if(n==="Person") return "#00b4ff"; return "#ffcc00"; }

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const pre = document.createElement("canvas"); pre.width = INPUT; pre.height = INPUT;
const pctx = pre.getContext("2d", { willReadFrequently: true });
// canvas auxiliar para comprimir el frame a JPEG en modo RunPod
const jpg = document.createElement("canvas");
const jctx = jpg.getContext("2d");
let session = null, running = false;
let mode = "local";              // "local" | "runpod"
let ws = null, wsReady = false;
let remoteDets = [];             // ultimas detecciones recibidas del servidor
let waitingReply = false;        // control de flujo: un frame en vuelo por vez

const $ = id => document.getElementById(id);
function setStatus(t){ $("status").textContent = t; }

function getRunpodURL(){
  let u = localStorage.getItem("runpod_url") || "";
  u = prompt("URL del servidor RunPod (wss://...proxy.runpod.net):", u) || "";
  u = u.trim();
  if(u) localStorage.setItem("runpod_url", u);
  return u;
}

function connectWS(url){
  return new Promise((resolve, reject) => {
    try { ws = new WebSocket(url); } catch(e){ return reject(e); }
    ws.binaryType = "arraybuffer";
    ws.onopen = () => { wsReady = true; resolve(); };
    ws.onerror = (e) => reject(new Error("no se pudo conectar"));
    ws.onclose = () => { wsReady = false; };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        remoteDets = msg.dets || [];
      } catch(e){}
      waitingReply = false;
    };
  });
}

function setMode(m){
  mode = m;
  $("mode-local").classList.toggle("active", m === "local");
  $("mode-runpod").classList.toggle("active", m === "runpod");
}
$("mode-local").addEventListener("click", () => {
  setMode("local");
  if(running) setStatus("Modo: procesando en el celular (WebGPU)");
});
$("mode-runpod").addEventListener("click", async () => {
  const url = getRunpodURL();
  if(!url){ return; }
  setStatus("Conectando a RunPod...");
  try {
    await connectWS(url);
    setMode("runpod");
    $("backend").textContent = "runpod";
    setStatus("Modo: procesando en RunPod (GPU)");
  } catch(e){
    setStatus("Error RunPod: " + e.message + " — sigo en modo celular");
    setMode("local");
  }
});

async function init(){
  const hasGPU = !!navigator.gpu;
  setStatus("WebGPU en navegador: " + (hasGPU ? "SÍ" : "NO") + ". Cargando modelo (35 MB)...");
  let backend = "wasm";
  if(hasGPU){
    try {
      session = await ort.InferenceSession.create(MODEL_URL, {
        executionProviders: ["webgpu"], graphOptimizationLevel: "all"
      });
      backend = "webgpu";
    } catch(e){ console.warn("WebGPU falló:", e); }
  }
  if(!session){
    try {
      session = await ort.InferenceSession.create(MODEL_URL, {
        executionProviders: ["wasm"], graphOptimizationLevel: "all"
      });
      backend = "wasm";
    } catch(e){ setStatus("Error modelo: " + e.message); throw e; }
  }
  $("backend").textContent = backend;
  setStatus("Modelo cargado (" + backend + "). Iniciando cámara...");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: {ideal:1280}, height: {ideal:720} }, audio: false
  });
  video.srcObject = stream;
  await video.play();
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  setStatus("Corriendo");
  running = true;
  loop();
}

function preprocess(){
  const vw = video.videoWidth, vh = video.videoHeight;
  const r = Math.min(INPUT/vw, INPUT/vh);
  const nw = Math.round(vw*r), nh = Math.round(vh*r);
  pctx.fillStyle = "rgb(114,114,114)"; pctx.fillRect(0,0,INPUT,INPUT);
  pctx.drawImage(video, 0,0, nw, nh);
  const data = pctx.getImageData(0,0,INPUT,INPUT).data;
  const arr = new Float32Array(INPUT*INPUT*3);
  const area = INPUT*INPUT;
  for(let i=0;i<area;i++){
    const j=i*4;
    arr[i]         = data[j+2]; // B
    arr[area+i]    = data[j+1]; // G
    arr[2*area+i]  = data[j];   // R
  }
  return { tensor: new ort.Tensor("float32", arr, [1,3,INPUT,INPUT]), r };
}

function nms(boxes, scores, thr){
  const idx = scores.map((s,i)=>i).sort((a,b)=>scores[b]-scores[a]);
  const keep=[];
  while(idx.length){
    const c=idx.shift(); keep.push(c);
    for(let k=idx.length-1;k>=0;k--){
      if(iou(boxes[c],boxes[idx[k]])>thr) idx.splice(k,1);
    }
  }
  return keep;
}
function iou(a,b){
  const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]),x2=Math.min(a[2],b[2]),y2=Math.min(a[3],b[3]);
  const w=Math.max(0,x2-x1),h=Math.max(0,y2-y1),inter=w*h;
  const areaA=(a[2]-a[0])*(a[3]-a[1]),areaB=(b[2]-b[0])*(b[3]-b[1]);
  return inter/(areaA+areaB-inter);
}

function postprocess(out, r){
  const d = out.data, n = out.dims[1], stride = out.dims[2];
  const boxes=[], scores=[], clsIds=[];
  for(let i=0;i<n;i++){
    const o=i*stride, obj=d[o+4];
    let best=5, bestv=d[o+5];
    for(let c=6;c<stride;c++){ if(d[o+c]>bestv){ bestv=d[o+c]; best=c; } }
    const score=obj*bestv;
    if(score<CONF) continue;
    if(!SHOW.has(CLASSES[best-5])) continue; // descartar clases irrelevantes
    const cx=d[o],cy=d[o+1],w=d[o+2],h=d[o+3];
    boxes.push([(cx-w/2)/r,(cy-h/2)/r,(cx+w/2)/r,(cy+h/2)/r]);
    scores.push(score); clsIds.push(best-5);
  }
  const results=[];
  const uniq=[...new Set(clsIds)];
  for(const c of uniq){
    const gi=clsIds.map((v,i)=>i).filter(i=>clsIds[i]===c);
    const gb=gi.map(i=>boxes[i]), gs=gi.map(i=>scores[i]);
    for(const k of nms(gb,gs,NMS)){
      results.push({box:gb[k], cls:CLASSES[c], score:gs[k]});
    }
  }
  return results;
}

const SEND_W = 960;  // ancho al que se manda el frame en modo RunPod
function drawFrame(dets, scale){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  ctx.lineWidth=3; ctx.font="18px sans-serif";
  for(const d of dets){
    const x1=d.box[0]*scale, y1=d.box[1]*scale, x2=d.box[2]*scale, y2=d.box[3]*scale;
    const col=colorFor(d.cls);
    ctx.strokeStyle=col; ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    ctx.fillStyle=col; const lbl=d.cls;
    const tw=ctx.measureText(lbl).width;
    ctx.fillRect(x1,y1-22,tw+8,22);
    ctx.fillStyle="#fff"; ctx.fillText(lbl,x1+4,y1-5);
  }
  $("ndet").textContent=dets.length;
}

function sendFrameWS(){
  const vw=video.videoWidth, vh=video.videoHeight;
  const sh=Math.round(vh*SEND_W/vw);
  jpg.width=SEND_W; jpg.height=sh;
  jctx.drawImage(video,0,0,SEND_W,sh);
  waitingReply=true;
  jpg.toBlob(async(blob)=>{
    if(blob && wsReady){ try { ws.send(await blob.arrayBuffer()); } catch(e){ waitingReply=false; } }
    else waitingReply=false;
  }, "image/jpeg", 0.6);
}

let frames=0, lastT=performance.now(), fps=0;
async function loop(){
  if(!running) return;
  if(mode==="local"){
    const { tensor, r } = preprocess();
    const t0=performance.now();
    const out = await session.run({ [session.inputNames[0]]: tensor });
    const t1=performance.now();
    const dets = postprocess(out[session.outputNames[0]], r);
    drawFrame(dets, 1);
    $("inftime").textContent=(t1-t0).toFixed(0);
  } else {
    if(wsReady && !waitingReply) sendFrameWS();
    drawFrame(remoteDets, canvas.width/SEND_W);
  }

  frames++;
  const now=performance.now();
  if(now-lastT>=500){ fps=frames*1000/(now-lastT); frames=0; lastT=now;
    $("fps").innerHTML=`<b>${fps.toFixed(1)}</b> FPS`; }
  requestAnimationFrame(loop);
}

$("start").addEventListener("click", async ()=>{
  $("start").style.display="none";
  try { await init(); } catch(e){ setStatus("Error: "+e.message); $("start").style.display="block"; }
});
</script>
</body>
</html>
